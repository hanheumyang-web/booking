<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASSI - 마스터 대시보드</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000000; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", Roboto, sans-serif; color: #FFFFFF; }
        .app-container { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .header h1 { margin: 0; font-size: 28px; font-weight: 800; color: #007AFF; letter-spacing: -0.5px; }
        .header p { margin: 4px 0 0 0; color: #888; font-size: 14px; }
        
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .kpi-card { background: #111; border: 1px solid #333; border-radius: 16px; padding: 24px; display: flex; flex-direction: column; justify-content: space-between; }
        .kpi-label { font-size: 13px; color: #888; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .kpi-value { font-size: 32px; font-weight: 800; margin: 0; color: #FFF; }
        .kpi-value.highlight { color: #34C759; }
        
        .section-title { font-size: 20px; font-weight: 700; margin: 0 0 20px 0; border-left: 4px solid #007AFF; padding-left: 12px; }
        
        table { width: 100%; border-collapse: collapse; background: #111; border-radius: 16px; overflow: hidden; }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid #333; font-size: 14px; }
        th { background: #1A1A1A; color: #888; font-weight: 600; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #1A1A1A; }
        .badge { background: #007AFF; color: #FFF; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        
        #authScreen { position: fixed; top:0; left:0; right:0; bottom:0; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .auth-box { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        .auth-input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #333; background: #000; color: #FFF; margin-bottom: 16px; box-sizing: border-box; font-size: 16px; }
        .auth-btn { background: #007AFF; color: #FFF; border: none; padding: 14px; border-radius: 8px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="authScreen">
    <div class="auth-box">
        <h2 style="margin:0 0 8px 0; color:#007AFF;">ASSI Master Admin</h2>
        <p style="color:#888; margin-bottom:24px; font-size:14px;">개발자 액세스 코드를 입력하세요.</p>
        <input type="password" id="devPasscode" class="auth-input" placeholder="Passcode">
        <button class="auth-btn" onclick="checkDevAuth()">접속하기</button>
    </div>
</div>

<div class="app-container" id="mainApp" style="display:none;">
    <div class="header">
        <div>
            <h1>ASSI Master Dashboard</h1>
            <p id="lastUpdatedText">마지막 동기화: 로딩중...</p>
        </div>
        <button style="background:#333; color:#FFF; border:none; padding:10px 16px; border-radius:8px; cursor:pointer;" onclick="loadGlobalData()">🔄 새로고침</button>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card">
            <span class="kpi-label">가입된 스튜디오 (유저)</span>
            <h2 class="kpi-value" id="kpiUsers">0</h2>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">생성된 총 예약 건수</span>
            <h2 class="kpi-value" id="kpiBookings">0</h2>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">플랫폼 누적 거래액 (GMV)</span>
            <h2 class="kpi-value highlight" id="kpiRevenue">₩ 0</h2>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">전체 예약폼 누적 조회수</span>
            <h2 class="kpi-value" id="kpiViews">0</h2>
        </div>
    </div>

    <h2 class="section-title">가입 스튜디오 현황 및 랭킹</h2>
    <div style="overflow-x: auto;">
        <table id="freelancerTable">
            <thead>
                <tr>
                    <th>링크 ID</th>
                    <th>상호명</th>
                    <th>폼 조회수</th>
                    <th>받은 예약 수</th>
                    <th>누적 매출액</th>
                    <th>전환율</th>
                </tr>
            </thead>
            <tbody id="freelancerTableBody">
                <tr><td colspan="6" style="text-align:center; padding:30px; color:#888;">데이터를 불러오는 중입니다...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://whqjrhvvufadzethfvza.supabase.co';
    const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_DWccD4VzZL7uGlEgc29enQ_GlGWf3b-';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

    // 💡 아주 단순한 개발자용 비밀번호 (광고 테스트용이므로 임시로 하드코딩)
    const DEV_PASSCODE = "assi2026"; 

    function checkDevAuth() {
        const input = document.getElementById('devPasscode').value;
        if (input === DEV_PASSCODE) {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadGlobalData();
        } else {
            alert("코드가 일치하지 않습니다.");
        }
    }

    async function loadGlobalData() {
        try {
            // 1. 모든 프리랜서 프로필 가져오기
            const { data: profiles, error: err1 } = await db.from('Freelancer_Profiles').select('*');
            // 2. 모든 예약 내역 가져오기
            const { data: bookings, error: err2 } = await db.from('Bookings').select('*');

            if (err1 || err2) {
                alert("데이터를 불러오는 중 오류가 발생했습니다. (Supabase RLS 설정을 확인하세요)");
                console.error(err1, err2);
                return;
            }

            let totalUsers = profiles ? profiles.length : 0;
            let totalBookings = 0;
            let totalRevenue = 0;
            let totalViews = 0;

            // 스튜디오별 데이터를 정리할 객체
            let studioStats = {};

            // 프로필 초기화 및 조회수 합산
            if (profiles) {
                profiles.forEach(p => {
                    let settings = {};
                    try { settings = p.bank_info._appSettings || {}; } catch(e) {}
                    
                    const views = settings.page_views || 0;
                    totalViews += views;

                    studioStats[p.id] = {
                        link_id: settings.link_id || '미설정',
                        name: p.business_name || '이름없음',
                        views: views,
                        bookingCount: 0,
                        revenue: 0
                    };
                });
            }

            // 예약 데이터 합산
            if (bookings) {
                bookings.forEach(b => {
                    if (b.status !== 'cancelled') {
                        totalBookings++;
                        totalRevenue += (b.total_price || 0);
                        
                        if (studioStats[b.freelancer_id]) {
                            studioStats[b.freelancer_id].bookingCount++;
                            studioStats[b.freelancer_id].revenue += (b.total_price || 0);
                        }
                    }
                });
            }

            // 상단 KPI 렌더링
            document.getElementById('kpiUsers').innerText = totalUsers;
            document.getElementById('kpiBookings').innerText = totalBookings;
            document.getElementById('kpiRevenue').innerText = `₩ ${totalRevenue.toLocaleString()}`;
            document.getElementById('kpiViews').innerText = totalViews;

            // 테이블 렌더링 (예약 많은 순으로 정렬)
            const sortedStudios = Object.values(studioStats).sort((a, b) => b.bookingCount - a.bookingCount);
            
            const tbody = document.getElementById('freelancerTableBody');
            if (sortedStudios.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:30px; color:#888;">가입된 유저가 없습니다.</td></tr>';
            } else {
                let html = '';
                sortedStudios.forEach(s => {
                    const convRate = s.views > 0 ? ((s.bookingCount / s.views) * 100).toFixed(1) : '0.0';
                    html += `
                        <tr>
                            <td><span class="badge">${s.link_id}</span></td>
                            <td style="font-weight:bold; color:#FFF;">${s.name}</td>
                            <td>${s.views}회</td>
                            <td style="color:#007AFF; font-weight:bold;">${s.bookingCount}건</td>
                            <td>₩ ${s.revenue.toLocaleString()}</td>
                            <td style="color:#34C759;">${convRate}%</td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            }

            const now = new Date();
            document.getElementById('lastUpdatedText').innerText = `마지막 동기화: ${now.toLocaleTimeString()}`;

        } catch (error) {
            console.error("Dashboard Load Error:", error);
        }
    }
</script>
</body>
</html>
