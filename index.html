<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 페이지 - ASSI 예약하기</title>
    <style>
        /* iOS 스타일 미니멀리즘 공통 설정 */
        body { margin: 0; padding: 0; background-color: #F5F5F7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #1D1D1F; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background-color: #FFFFFF; box-shadow: 0 0 20px rgba(0,0,0,0.05); padding: 24px; box-sizing: border-box; position: relative; overflow: hidden; }
        
        .step-view { display: none; animation: slideIn 0.3s ease forwards; }
        .step-view.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .top-nav { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; padding-top: 10px; }
        .back-btn { background: none; border: none; font-size: 24px; color: #007AFF; cursor: pointer; padding: 0; line-height: 1; }
        .nav-title { font-size: 18px; font-weight: 600; margin: 0; }

        .profile-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
        .profile-img { width: 56px; height: 56px; border-radius: 50%; background-color: #E5E5EA; background-position: center; background-size: cover; display: flex; justify-content: center; align-items: center; font-size: 24px; color: #86868B; border: 1px solid #E5E5EA; }
        .profile-info h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px 0; }
        .profile-info p { font-size: 13px; color: #86868B; margin: 0; }

        .notice-box { background: #F5F5F7; border-radius: 12px; padding: 16px; font-size: 14px; line-height: 1.5; color: #1D1D1F; white-space: pre-wrap; margin-bottom: 24px; }
        
        .faq-item { border: 1px solid #E5E5EA; border-radius: 12px; margin-bottom: 8px; overflow: hidden; background: #FFF; transition: 0.3s; }
        .faq-question { padding: 16px; font-size: 14px; font-weight: 600; color: #1D1D1F; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .faq-answer { padding: 0 16px; max-height: 0; overflow: hidden; font-size: 13px; color: #555; line-height: 1.5; transition: max-height 0.3s ease, padding 0.3s ease; white-space: pre-wrap; background: #F9F9FB; }
        .faq-item.active .faq-answer { padding: 12px 16px 16px 16px; max-height: 500px; border-top: 1px dashed #E5E5EA; }
        .faq-item.active .faq-icon { transform: rotate(180deg); }
        .faq-icon { transition: transform 0.3s ease; color: #86868B; }

        .time-filter-section { margin-bottom: 32px; }
        .section-label { font-size: 14px; font-weight: 600; color: #86868B; margin-bottom: 8px; display: block; }
        .time-picker-btn { background-color: #F5F5F7; border: 1px solid #E5E5EA; border-radius: 12px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; }
        
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .month-title { font-size: 18px; font-weight: 700; }
        .nav-btn { background: none; border: none; color: #007AFF; font-size: 18px; cursor: pointer; padding: 4px 12px; transition: opacity 0.2s; }
        .nav-btn:active { opacity: 0.5; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .weekday { font-size: 12px; color: #86868B; font-weight: 500; margin-bottom: 8px; }
        .weekday.sun { color: #FF3B30; } .weekday.sat { color: #007AFF; }
        
        .date-cell { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; font-size: 16px; border-radius: 50%; cursor: pointer; transition: all 0.2s ease; position: relative; }
        .date-cell.past { color: #C7C7CC; opacity: 0.3; cursor: not-allowed; pointer-events: none; }
        .date-cell.unopened { color: #C7C7CC; opacity: 0.5; cursor: not-allowed; pointer-events: none; text-decoration: line-through; }
        .date-cell.closed-period { color: #C7C7CC; background: #E5E5EA; opacity: 0.4; pointer-events: none; } 
        .date-cell.available { background-color: #F5F5F7; font-weight: 500; color: #1D1D1F; }
        .date-cell.available:active { background-color: #007AFF; color: #FFF; transform: scale(0.9); }
        .date-cell.filtered-highlight { border: 2px solid #007AFF; background-color: #EBF4FF; color: #007AFF; font-weight: 700; }

        .bottom-sheet-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 100; }
        .bottom-sheet-overlay.active { opacity: 1; pointer-events: auto; }
        .bottom-sheet { position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #FFF; border-radius: 24px 24px 0 0; padding: 24px; box-sizing: border-box; transition: bottom 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 101; max-height: 70vh; display: flex; flex-direction: column; }
        .bottom-sheet.active { bottom: 0; }
        .sheet-handle { width: 40px; height: 5px; background: #E5E5EA; border-radius: 3px; margin: 0 auto 20px auto; flex-shrink: 0; }
        .sheet-title { font-size: 18px; font-weight: 700; margin: 0 0 16px 0; text-align: center; }
        
        .vertical-picker-list { overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-bottom: 20px; }
        .picker-item { padding: 16px; border-radius: 12px; text-align: center; font-size: 18px; font-weight: 500; cursor: pointer; background: #F5F5F7; color: #1D1D1F; transition: background 0.2s; }
        .picker-item.booked { background: transparent; color: #C7C7CC; text-decoration: line-through; border: 1px dashed #E5E5EA; cursor: not-allowed; }

        .form-group { margin-bottom: 24px; }
        .form-label { display: block; font-size: 14px; font-weight: 600; color: #1D1D1F; margin-bottom: 8px; }
        .required-mark { color: #FF3B30; font-size: 12px; margin-left: 4px; }
        
        .service-select-card { border: 1px solid #E5E5EA; border-radius: 12px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s ease; display: flex; justify-content: space-between; align-items: center; }
        .service-select-card.selected { border-color: #007AFF; background-color: #EBF4FF; }
        .service-title { font-size: 16px; font-weight: 600; margin: 0 0 4px 0; }
        .service-price { font-size: 14px; font-weight: 500; margin: 0; }
        .deposit-badge { font-size: 11px; background: #FFF; border: 1px solid #007AFF; color: #007AFF; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 4px; }

        .input-text { width: 100%; padding: 14px; border: 1px solid #E5E5EA; border-radius: 12px; font-size: 15px; box-sizing: border-box; background-color: #F5F5F7; transition: 0.2s; font-family: inherit;}
        .input-text:focus { outline: none; border-color: #007AFF; background-color: #FFF; }
        
        .image-upload-box { border: 2px dashed #E5E5EA; border-radius: 12px; padding: 24px; text-align: center; color: #86868B; font-size: 14px; background: #F5F5F7; cursor: pointer; transition: 0.2s; }
        .image-upload-box:active { background: #E5E5EA; }

        .summary-card { background-color: #F5F5F7; border-radius: 16px; padding: 20px; margin-bottom: 24px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; }
        .summary-row.total { font-weight: 700; font-size: 18px; margin-top: 16px; padding-top: 16px; border-top: 1px solid #E5E5EA; color: #007AFF;}
        
        .policy-box { font-size: 13px; color: #86868B; background: #FFF; border: 1px solid #E5E5EA; border-radius: 12px; padding: 16px; line-height: 1.6; margin-bottom: 24px; }
        .account-info-box { background: #EBF4FF; border: 1px dashed #007AFF; border-radius: 12px; padding: 16px; text-align: center; margin-bottom: 32px; }

        .bottom-action-bar { margin-top: 32px; }
        .primary-btn { width: 100%; background-color: #007AFF; color: #FFF; border: none; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .primary-btn:disabled { background-color: #E5E5EA; color: #86868B; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="app-container">

    <div id="step1" class="step-view active">
        <div class="profile-header">
            <div class="profile-img" id="freelancerProfilePic">👤</div>
            <div class="profile-info">
                <h1 id="freelancerBrandName">로딩 중...</h1>
                <p>원하시는 예약 일정을 선택해 주세요.</p>
            </div>
        </div>

        <div id="noticeSection" style="display:none; margin-bottom: 24px;">
            <span class="section-label">📢 안내</span>
            <div class="notice-box" id="noticeContent"></div>
        </div>

        <div id="faqSection" style="display:none; margin-bottom: 32px;">
            <span class="section-label">💡 자주 묻는 질문</span>
            <div id="faqList"></div>
        </div>

        <div class="time-filter-section">
            <span class="section-label">특정 시간대로 예약 가능한 날짜 찾기</span>
            <div class="time-picker-btn" onclick="openTimeFilterSheet()"><span id="timePickerText">⏰ 시간을 선택해주세요</span><span class="icon">▾</span></div>
        </div>

        <div class="calendar-header">
            <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
            <span class="month-title" id="calMonthTitle">로딩중...</span>
            <button class="nav-btn" onclick="changeMonth(1)">❯</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div id="step2" class="step-view">
        <div class="top-nav"><button class="back-btn" onclick="goToStep('step1')">❮</button><h2 class="nav-title">예약 신청서 작성</h2></div>
        <p style="color: #007AFF; font-weight: 600; margin-bottom: 24px;" id="selectedDateTimeDisplay">선택된 날짜 및 시간</p>

        <div class="form-group">
            <label class="form-label">어떤 서비스를 원하시나요? <span class="required-mark">*필수</span></label>
            <div id="serviceListWrapper"><p style="color:#86868B; font-size:14px; text-align:center;">서비스 목록을 불러오는 중입니다...</p></div>
        </div>

        <div id="customFormFieldsArea"></div>

        <div class="form-group">
            <label class="form-label">예약자 성함 <span class="required-mark">*필수</span></label>
            <input type="text" id="inputCustomerName" class="input-text" placeholder="홍길동 (입금자명과 동일하게)">
        </div>

        <div class="form-group">
            <label class="form-label">연락처 (전화번호) <span class="required-mark">*필수</span></label>
            <input type="tel" id="inputPhone" class="input-text" placeholder="010-0000-0000">
        </div>

        <div class="form-group">
            <label class="form-label">이메일 주소 <span style="color:#86868B; font-size:12px; margin-left:4px;">(선택)</span></label>
            <input type="email" id="inputEmail" class="input-text" placeholder="example@email.com">
            <p style="margin: 6px 0 0 0; font-size: 13px; color: #86868B;">** 안내 사항 및 입금 정보가 문자로 전송됩니다.</p>
        </div>

        <div class="bottom-action-bar">
            <button class="primary-btn" onclick="validateStep2()">다음 단계 (결제)</button>
        </div>
    </div>

    <div id="step3" class="step-view">
        <div class="top-nav"><button class="back-btn" onclick="goToStep('step2')">❮</button><h2 class="nav-title">예약금 결제</h2></div>

        <div class="summary-card">
            <div class="summary-row"><span>일정</span><span id="finalDateTime" style="font-weight: 600;">날짜 미정</span></div>
            <div class="summary-row"><span>총 서비스 금액</span><span id="finalServicePrice" style="color: #86868B;">-</span></div>
            <div class="summary-row total"><span>결제하실 예약금</span><span id="finalDepositPrice">-</span></div>
        </div>

        <div class="form-label">환불 규정 동의 <span class="required-mark">*</span></div>
        <div class="policy-box">
            <div id="refundPolicyTextList">로딩 중...</div>
            <br>
            <label style="display: flex; align-items: flex-start; gap: 8px; font-weight: 600; color:#1D1D1F; cursor: pointer;">
                <input type="checkbox" id="checkRefundPolicy" style="width: 18px; height: 18px; flex-shrink: 0; margin-top: 2px;"> 
                <span>위 환불 규정을 확인하였으며, 동의합니다.</span>
            </label>
        </div>

        <div class="account-info-box">
            <p style="margin: 0 0 8px 0; font-size: 13px; font-weight: 700;">무통장 입금 계좌 안내</p>
            <p style="margin: 0; font-size: 18px; color: #007AFF; font-weight: 700; letter-spacing: 0.5px;" id="bankInfoDisplay">로딩 중...</p>
            <p style="margin: 4px 0 0 0; font-size: 13px; color: #86868B;" id="bankHolderDisplay">예금주: -</p>
        </div>

        <div class="bottom-action-bar">
            <button class="primary-btn" id="submitBtn" onclick="submitBookingToDB()">예약 신청 완료하기</button>
        </div>
    </div>

</div>

<div class="bottom-sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
<div class="bottom-sheet" id="bottomSheet"><div class="sheet-handle"></div><h3 class="sheet-title" id="sheetTitle">타이틀</h3><div class="vertical-picker-list" id="sheetContent"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://whqjrhvvufadzethfvza.supabase.co';
    const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_DWccD4VzZL7uGlEgc29enQ_GlGWf3b-';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

    let targetFreelancerId = null;
    let targetProfile = null;
    let targetSettings = null;

    let currentNavYear = new Date().getFullYear();
    let currentNavMonth = new Date().getMonth() + 1;
    let todayDateStr = `${currentNavYear}-${String(currentNavMonth).padStart(2, '0')}-${String(new Date().getDate()).padStart(2, '0')}`;

    let selectedDateRaw = ''; let selectedDateText = ''; let selectedTime = '';
    let selectedServiceId = null; let selectedServiceTotalPrice = null; let selectedServiceDepositPrice = null;
    
    let customAnswers = {}; 

    let dbServices = []; let dbSchedules = []; let dbBookings = [];
    let occupiedSlots = {}; 

    async function initCustomerPage() {
        let uParam = new URLSearchParams(window.location.search).get('u');
        if (!uParam && window.location.pathname.includes('/ASSI/')) {
            uParam = window.location.pathname.split('/ASSI/')[1].split('?')[0].replace('/', '');
        }

        if (!uParam) {
            alert('잘못된 접근입니다. 올바른 예약 링크로 접속해주세요.');
            document.body.innerHTML = '<h2 style="text-align:center; margin-top:50px;">페이지를 찾을 수 없습니다.</h2>';
            return;
        }
        uParam = decodeURIComponent(uParam); 

        try {
            const { data: allProfiles, error } = await db.from('Freelancer_Profiles').select('*');
            if (error) throw error;

            let matchedProfile = null;
            for (let profile of allProfiles) {
                if (profile.id === uParam) { matchedProfile = profile; break; }
                if (profile.bank_info && profile.bank_info._appSettings && profile.bank_info._appSettings.link_id === uParam) {
                    matchedProfile = profile; break;
                }
            }

            if (!matchedProfile) {
                alert('존재하지 않거나 변경된 예약 링크입니다.');
                document.body.innerHTML = '<h2 style="text-align:center; margin-top:50px;">존재하지 않는 페이지입니다.</h2>';
                return;
            }

            targetFreelancerId = matchedProfile.id;
            targetProfile = matchedProfile;
            targetSettings = (matchedProfile.bank_info && matchedProfile.bank_info._appSettings) ? matchedProfile.bank_info._appSettings : {
                global_schedule: { start: 10, end: 19, duration: 1, activeDays: [1,2,3,4,5], lunch: {enabled:false}, dinner: {enabled:false} },
                form_questions: [], refund_policies: [], page_views: 0
            };

            targetSettings.page_views = (targetSettings.page_views || 0) + 1;
            const updatedBankInfo = { ...matchedProfile.bank_info, _appSettings: targetSettings };
            db.from('Freelancer_Profiles').update({ bank_info: updatedBankInfo }).eq('id', targetFreelancerId).then(() => {});

            applyFreelancerTheme(); 
            renderCustomForms();    
            renderRefundUI();       

            const { data: services } = await db.from('Services').select('*').eq('freelancer_id', targetFreelancerId).order('created_at', { ascending: false });
            if (services) { dbServices = services; renderServices(); }
            
            const { data: schedules } = await db.from('Schedules').select('*').eq('freelancer_id', targetFreelancerId);
            if (schedules) dbSchedules = schedules;
            
            const { data: bookings } = await db.from('Bookings').select('*').eq('freelancer_id', targetFreelancerId);
            if (bookings) {
                dbBookings = bookings;
                buildOccupiedSlots();
            }
            
            renderCalendar(); 

        } catch (error) {
            console.error("데이터 로드 실패:", error);
        }
    }

    function buildOccupiedSlots() {
        occupiedSlots = {};
        dbBookings.forEach(b => {
            if (b.status === 'cancelled') return; 
            
            const date = b.booking_date;
            const startHour = parseInt(b.booking_time.split(':')[0]);
            
            const s = dbServices.find(srv => srv.id === b.service_id);
            const dur = s ? s.duration : targetSettings.global_schedule.duration;
            
            if(!occupiedSlots[date]) occupiedSlots[date] = [];
            for(let i=0; i<dur; i++) {
                occupiedSlots[date].push(startHour + i);
            }
        });
    }

    function applyFreelancerTheme() {
        document.getElementById('freelancerBrandName').innerText = targetSettings.name || targetProfile.business_name || '스튜디오 예약';
        const profileImg = document.getElementById('freelancerProfilePic');
        if (targetSettings.profile_image_url) { profileImg.style.backgroundImage = `url('${targetSettings.profile_image_url}')`; profileImg.style.border = 'none'; profileImg.innerHTML = ''; } 
        else { profileImg.innerHTML = '👤'; }

        if (targetProfile.bank_info) {
            document.getElementById('bankInfoDisplay').innerText = `${targetProfile.bank_info.bank} ${targetProfile.bank_info.account}`;
            document.getElementById('bankHolderDisplay').innerText = `예금주: ${targetProfile.bank_info.holder || targetProfile.business_name}`;
        }

        if (targetSettings.notice_text && targetSettings.notice_text.trim() !== '') {
            document.getElementById('noticeSection').style.display = 'block';
            document.getElementById('noticeContent').innerText = targetSettings.notice_text;
        }

        if (targetSettings.faq_list && targetSettings.faq_list.length > 0) {
            document.getElementById('faqSection').style.display = 'block';
            let faqHtml = '';
            targetSettings.faq_list.forEach((faq) => {
                faqHtml += `
                <div class="faq-item" onclick="this.classList.toggle('active')">
                    <div class="faq-question"><span>Q. ${faq.q}</span><span class="faq-icon">▾</span></div>
                    <div class="faq-answer">A. ${faq.a}</div>
                </div>`;
            });
            document.getElementById('faqList').innerHTML = faqHtml;
        }
    }

    function renderCustomForms() {
        const area = document.getElementById('customFormFieldsArea');
        if (!targetSettings.form_questions || targetSettings.form_questions.length === 0) return;
        let html = '';
        targetSettings.form_questions.forEach(q => {
            if (!q.active) return; 
            const reqMark = q.required ? '<span class="required-mark">*필수</span>' : '<span style="color:#86868B; font-size:12px; margin-left:4px;">(선택)</span>';
            html += `<div class="form-group">`;
            html += `<label class="form-label">${q.text} ${reqMark}</label>`;
            if (q.type === 'text') {
                html += `<input type="text" id="customInput_${q.id}" class="input-text" placeholder="여기에 답변을 적어주세요">`;
            } else if (q.type === 'image') {
                html += `<input type="file" id="customImgFile_${q.id}" accept="image/*" style="display:none;" onchange="handleCustomImage(event, ${q.id})">`;
                html += `<div class="image-upload-box" id="customImgBox_${q.id}" onclick="document.getElementById('customImgFile_${q.id}').click()">`;
                html += `<span style="font-size: 24px;">📸</span><br><span id="customImgText_${q.id}">터치하여 이미지 첨부</span></div>`;
                html += `<input type="text" id="customInput_${q.id}" class="input-text" placeholder="사진에 대한 추가 설명 (선택사항)" style="margin-top:8px;">`;
            }
            html += `</div>`;
        });
        area.innerHTML = html;
    }

    function handleCustomImage(event, qId) {
        const file = event.target.files[0];
        if(file) { customAnswers[`img_${qId}`] = file; document.getElementById(`customImgText_${qId}`).innerText = `✅ 첨부 완료: ${file.name}`; document.getElementById(`customImgBox_${qId}`).style.borderColor = '#007AFF'; document.getElementById(`customImgBox_${qId}`).style.backgroundColor = '#EBF4FF'; }
    }

    function renderRefundUI() {
        const list = document.getElementById('refundPolicyTextList');
        if (!targetSettings.refund_policies || targetSettings.refund_policies.length === 0) { list.innerHTML = "등록된 별도 환불 규정이 없습니다."; return; }
        targetSettings.refund_policies.sort((a,b) => b.days - a.days);
        list.innerHTML = targetSettings.refund_policies.map(r => `- ${r.days === 0 ? '당일 취소 및 노쇼' : `예약일 ${r.days}일 전 취소`}: <span style="font-weight:700; color:${r.percent===0?'#FF3B30':'#1D1D1F'};">${r.percent === 0 ? '환불 불가' : `${r.percent}% 환불`}</span>`).join('<br>');
    }

    function changeMonth(offset) {
        currentNavMonth += offset;
        if (currentNavMonth < 1) { currentNavMonth = 12; currentNavYear--; }
        if (currentNavMonth > 12) { currentNavMonth = 1; currentNavYear++; }
        renderCalendar();
    }

    function renderCalendar() {
        document.getElementById('calMonthTitle').innerText = `${currentNavYear}년 ${currentNavMonth}월`;
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = `<div class="weekday sun">일</div><div class="weekday">월</div><div class="weekday">화</div><div class="weekday">수</div><div class="weekday">목</div><div class="weekday">금</div><div class="weekday sat">토</div>`;
        
        const firstDay = new Date(currentNavYear, currentNavMonth - 1, 1).getDay(); 
        const daysInMonth = new Date(currentNavYear, currentNavMonth, 0).getDate();
        
        for (let i = 0; i < firstDay; i++) { grid.innerHTML += `<div></div>`; }

        for (let i = 1; i <= daysInMonth; i++) {
            const cell = document.createElement('div'); cell.classList.add('date-cell'); cell.innerText = i;
            const targetDateStr = `${currentNavYear}-${String(currentNavMonth).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            
            const dayOfWeek = (firstDay + i - 1) % 7;
            const isReg = targetSettings.global_schedule.activeDays.includes(dayOfWeek);
            const scheduleForDay = dbSchedules.find(s => s.target_date === targetDateStr);
            
            let isClosed = false;
            if (scheduleForDay) { isClosed = scheduleForDay.is_day_off; }
            else if (!isReg) { isClosed = true; }
            
            if (targetDateStr < todayDateStr) { cell.classList.add('past'); } 
            else if (targetSettings.open_period_date && targetDateStr > targetSettings.open_period_date) { cell.classList.add('closed-period'); } 
            else if (isClosed) { cell.classList.add('unopened'); } 
            else { 
                cell.classList.add('available'); 
                cell.onclick = () => openDateActionSheet(i, targetDateStr, scheduleForDay?.blocked_hours || []); 
            }
            grid.appendChild(cell);
        }
    }

    function renderServices() {
        const wrapper = document.getElementById('serviceListWrapper'); wrapper.innerHTML = ''; 
        if(dbServices.length === 0) { wrapper.innerHTML = '<p style="color:#86868B; font-size:14px; text-align:center;">현재 예약 가능한 상품이 없습니다.</p>'; return; }
        
        let initialDepositRatio = targetSettings.deposit_ratio || 30; 

        dbServices.forEach((service, index) => {
            const isSelected = index === 0 ? 'selected' : '';
            let calculatedDeposit = service.deposit_price;
            if (!calculatedDeposit || calculatedDeposit === 0) { calculatedDeposit = Math.floor((service.price || 0) * (initialDepositRatio / 100)); }

            const priceText = service.is_consult ? "상담 후 최종가 결정" : `₩${(service.price || 0).toLocaleString()}`;
            const depositText = `예약금 ₩${calculatedDeposit.toLocaleString()}`;
            
            if (isSelected) selectService(service.id, service.price, calculatedDeposit, service.is_consult);
            
            const cardHtml = `<div class="service-select-card ${isSelected}" onclick="selectServiceCard(this, '${service.id}', ${service.price}, ${calculatedDeposit}, ${service.is_consult})"><div><h3 class="service-title">${service.title}</h3><p class="service-price" style="${service.is_consult ? 'color:#007AFF;' : ''}">${priceText}</p></div><div style="text-align: right;"><span class="deposit-badge">${depositText}</span></div></div>`;
            wrapper.insertAdjacentHTML('beforeend', cardHtml);
        });
    }

    const overlay = document.getElementById('sheetOverlay'); const sheet = document.getElementById('bottomSheet'); const sheetTitle = document.getElementById('sheetTitle'); const sheetContent = document.getElementById('sheetContent');
    function openSheet() { overlay.classList.add('active'); sheet.classList.add('active'); }
    function closeSheet() { overlay.classList.remove('active'); sheet.classList.remove('active'); }
    function formatTime(hour) { return hour.toString().padStart(2, '0') + ':00'; }
    function formatTimeDB(hour) { return hour.toString().padStart(2, '0') + ':00:00'; } 

    function openTimeFilterSheet() {
        sheetTitle.innerText = "어떤 시간에 예약할까요?"; let html = '';
        for(let i = targetSettings.global_schedule.start; i < targetSettings.global_schedule.end; i++) { 
            html += `<div class="picker-item" onclick="applyTimeFilter('${formatTime(i)}')">${formatTime(i)} 빈 일정 찾기</div>`; 
        }
        sheetContent.innerHTML = html; openSheet();
    }
    function applyTimeFilter(time) { closeSheet(); document.getElementById('timePickerText').innerText = `⏰ ${time} 예약 가능 날짜 찾기`; document.querySelectorAll('.date-cell.available').forEach(c => { c.classList.remove('filtered-highlight'); if (parseInt(c.innerText) % 2 === 0) c.classList.add('filtered-highlight'); }); }

    function openDateActionSheet(day, targetDateStr, blockedHours) {
        selectedDateRaw = targetDateStr; selectedDateText = `${currentNavMonth}월 ${day}일`; sheetTitle.innerText = `${selectedDateText} 예약 가능 시간`;
        let html = '';
        
        for(let i = targetSettings.global_schedule.start; i < targetSettings.global_schedule.end; i++) {
            const timeUI = formatTime(i); const timeDB = formatTimeDB(i);
            
            const isBlockedByAdmin = blockedHours.includes(i) || (targetSettings.global_schedule.lunch.enabled && i === targetSettings.global_schedule.lunch.time) || (targetSettings.global_schedule.dinner.enabled && i === targetSettings.global_schedule.dinner.time); 
            const isBookedByOthers = occupiedSlots[targetDateStr] && occupiedSlots[targetDateStr].includes(i);
            
            if(isBlockedByAdmin || isBookedByOthers) { 
                html += `<div class="picker-item booked">${timeUI} 예약 마감</div>`; 
            } else { 
                html += `<div class="picker-item" onclick="selectTimeAndGoToForm('${timeUI}', '${timeDB}')">${timeUI} 예약하기</div>`; 
            }
        }
        sheetContent.innerHTML = html; openSheet();
    }

    function selectTimeAndGoToForm(timeUI, timeDB) { selectedTime = timeDB; closeSheet(); document.getElementById('selectedDateTimeDisplay').innerText = `${selectedDateText} ${timeUI} 선택됨`; document.getElementById('finalDateTime').innerText = `${selectedDateText} ${timeUI}`; goToStep('step2'); }

    function selectServiceCard(element, id, price, deposit, isConsult) {
        document.querySelectorAll('.service-select-card').forEach(el => el.classList.remove('selected'));
        element.classList.add('selected'); selectService(id, price, deposit, isConsult);
    }
    
    function selectService(id, price, deposit, isConsult) {
        selectedServiceId = id; selectedServiceTotalPrice = price || 0; selectedServiceDepositPrice = deposit || 0;
        if (isConsult) { document.getElementById('finalServicePrice').innerText = '상담 후 최종가 결정'; document.getElementById('finalServicePrice').style.color = '#86868B'; } 
        else { document.getElementById('finalServicePrice').innerText = `₩${selectedServiceTotalPrice.toLocaleString()}`; document.getElementById('finalServicePrice').style.color = '#1D1D1F'; }
        document.getElementById('finalDepositPrice').innerText = `₩${selectedServiceDepositPrice.toLocaleString()}`;
    }

    function validateStep2() {
        const name = document.getElementById('inputCustomerName').value.trim();
        const phone = document.getElementById('inputPhone').value.trim();
        
        if (!name) return alert("예약자 성함을 입력해주세요.");
        if (!phone) return alert("연락처(전화번호)를 입력해주세요.");
        if (!selectedServiceId) return alert("원하시는 서비스를 선택해주세요.");
        
        if (targetSettings.form_questions && targetSettings.form_questions.length > 0) {
            for (let q of targetSettings.form_questions) {
                if (!q.active || !q.required) continue;
                
                if (q.type === 'text') {
                    const txt = document.getElementById(`customInput_${q.id}`).value.trim();
                    if (!txt) return alert(`필수 질문에 답변해주세요: ${q.text}`);
                } else if (q.type === 'image') {
                    if (!customAnswers[`img_${q.id}`]) return alert(`필수 이미지를 첨부해주세요: ${q.text}`);
                }
            }
        }
        goToStep('step3');
    }

    async function submitBookingToDB() {
        const checkPolicy = document.getElementById('checkRefundPolicy').checked;
        if (!checkPolicy) return alert("환불 규정에 동의하셔야 예약을 완료할 수 있습니다.");

        const customerName = document.getElementById('inputCustomerName').value.trim();
        const phoneValue = document.getElementById('inputPhone').value.trim();
        const emailValue = document.getElementById('inputEmail').value.trim();
        
        const btn = document.getElementById('submitBtn');
        btn.innerText = "예약 처리 및 파일 전송 중..."; btn.disabled = true;

        try {
            let uploadedImageUrls = [];
            let customTextAnswers = {};

            if (targetSettings.form_questions) {
                for (let q of targetSettings.form_questions) {
                    if (!q.active) continue;
                    
                    if (q.type === 'text') {
                        customTextAnswers[q.text] = document.getElementById(`customInput_${q.id}`).value.trim();
                    } else if (q.type === 'image') {
                        customTextAnswers[q.text] = document.getElementById(`customInput_${q.id}`).value.trim();
                        if (customAnswers[`img_${q.id}`]) {
                            const file = customAnswers[`img_${q.id}`];
                            const fileExt = file.name.split('.').pop();
                            const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
                            
                            const { error: uploadError } = await db.storage.from('draft_images').upload(fileName, file);
                            if (uploadError) throw uploadError;
                            
                            const { data: publicUrlData } = db.storage.from('draft_images').getPublicUrl(fileName);
                            uploadedImageUrls.push(publicUrlData.publicUrl);
                        }
                    }
                }
            }

            const finalReferenceData = {
                phone: phoneValue,
                email: emailValue,
                answers: customTextAnswers
            };

            const { error: insertError } = await db.from('Bookings').insert([{
                freelancer_id: targetFreelancerId,
                service_id: selectedServiceId,
                customer_name: customerName,
                booking_date: selectedDateRaw,
                booking_time: selectedTime,
                reference_url: JSON.stringify(finalReferenceData), 
                draft_image_url: uploadedImageUrls, 
                total_price: selectedServiceTotalPrice,
                deposit_price: selectedServiceDepositPrice,
                status: 'pending' 
            }]);

            if (insertError) throw insertError;

            alert("🎉 예약 신청이 성공적으로 완료되었습니다!\n스튜디오에서 곧 안내 문자를 드릴 예정입니다.");
            window.location.reload();

        } catch (error) {
            console.error("예약 실패:", error);
            alert("예약 처리 중 오류가 발생했습니다. 다시 시도해주세요.");
            btn.innerText = "예약 신청 완료하기"; btn.disabled = false;
        }
    }

    function goToStep(stepId) { document.querySelectorAll('.step-view').forEach(el => el.classList.remove('active')); document.getElementById(stepId).classList.add('active'); window.scrollTo(0,0); }

    initCustomerPage();
</script>
